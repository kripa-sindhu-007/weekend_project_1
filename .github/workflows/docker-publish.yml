name: Build and Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

env:
  DOCKERHUB_NAMESPACE: kripasindhu007
  BACKEND_IMAGE: kripasindhu007/taskqueue-backend
  FRONTEND_IMAGE: kripasindhu007/taskqueue-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images
        run: |
          docker pull ${{ env.BACKEND_IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          docker pull ${{ env.FRONTEND_IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          docker inspect ${{ env.BACKEND_IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          docker inspect ${{ env.FRONTEND_IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
