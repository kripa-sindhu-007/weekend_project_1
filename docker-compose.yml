services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: kripasindhu007/taskqueue-backend:latest
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - WORKER_COUNT=5
      - POLL_INTERVAL_MS=500
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: kripasindhu007/taskqueue-frontend:latest
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
